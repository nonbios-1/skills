<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spreadsheet Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/dist/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-theme-alpine.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .toolbar {
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .toolbar button {
            padding: 6px 12px;
            font-size: 0.875rem;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }
        .toolbar button:hover {
            background: #e9ecef;
        }
        .toolbar .file-name {
            margin-left: auto;
            font-size: 0.875rem;
            color: #6c757d;
        }
        #myGrid {
            height: calc(100vh - 70px);
            width: 100%;
        }
        .notification {
            position: fixed;
            top: 60px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 0.875rem;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        .notification.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .notification.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="exportCSV()">Export CSV</button>
        <button onclick="saveChanges()">Save Changes</button>
        <span class="file-name" id="fileName">Loading...</span>
    </div>
    <div id="myGrid" class="ag-theme-alpine"></div>

    <script>
        let gridApi;
        let currentFile = '';
        let hasChanges = false;

        // Get file parameter from URL
        function getFileParameter() {
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');
            
            // Default to sample-data.csv if no file specified
            if (!file) {
                return 'sample-data.csv';
            }
            
            // Basic validation - only allow alphanumeric, dash, underscore, and .csv extension
            if (!/^[a-zA-Z0-9_-]+\.csv$/.test(file)) {
                showNotification('Invalid file name. Only alphanumeric characters, dashes, underscores, and .csv extension allowed.', 'error');
                return 'sample-data.csv';
            }
            
            return file;
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Load CSV data
        async function loadCSV() {
            currentFile = getFileParameter();
            document.getElementById('fileName').textContent = currentFile;
            
            try {
                const response = await fetch(currentFile);
                if (!response.ok) {
                    throw new Error(`Failed to load ${currentFile}`);
                }
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                if (data.length === 0) {
                    showNotification('CSV file is empty', 'error');
                    return;
                }
                
                // Create column definitions from headers
                const headers = Object.keys(data[0]);
                const columnDefs = headers.map(header => ({
                    field: header,
                    sortable: true,
                    filter: true,
                    editable: true,
                    resizable: true
                }));
                
                // Grid options
                const gridOptions = {
                    columnDefs: columnDefs,
                    rowData: data,
                    pagination: true,
                    paginationPageSize: 20,
                    paginationPageSizeSelector: [10, 20, 50, 100],
                    defaultColDef: {
                        flex: 1,
                        minWidth: 100
                    },
                    onCellValueChanged: (event) => {
                        hasChanges = true;
                        showNotification('Cell updated (auto-saved)', 'success');
                    }
                };
                
                // Create grid
                const gridDiv = document.querySelector('#myGrid');
                gridApi = agGrid.createGrid(gridDiv, gridOptions);
                
            } catch (error) {
                showNotification(`Error loading CSV: ${error.message}`, 'error');
                console.error('Error:', error);
            }
        }

        // Parse CSV text to array of objects
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim());
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] || '';
                });
                return obj;
            });
        }

        // Convert grid data to CSV
        function gridToCSV() {
            const rowData = [];
            gridApi.forEachNode(node => rowData.push(node.data));
            
            if (rowData.length === 0) return '';
            
            const headers = Object.keys(rowData[0]);
            const csvRows = [headers.join(',')];
            
            rowData.forEach(row => {
                const values = headers.map(header => {
                    const value = row[header] || '';
                    // Escape commas and quotes
                    return value.toString().includes(',') ? `"${value}"` : value;
                });
                csvRows.push(values.join(','));
            });
            
            return csvRows.join('\n');
        }

        // Export CSV to download
        function exportCSV() {
            const csvContent = gridToCSV();
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFile.replace('.csv', '_export.csv');
            a.click();
            window.URL.revokeObjectURL(url);
            showNotification('CSV exported successfully', 'success');
        }

        // Save changes to server
        async function saveChanges() {
            try {
                const csvContent = gridToCSV();
                
                const response = await fetch('save-csv.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        csv: csvContent,
                        file: currentFile
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    hasChanges = false;
                    showNotification('Changes saved successfully', 'success');
                } else {
                    showNotification(`Error: ${result.message}`, 'error');
                }
            } catch (error) {
                showNotification(`Error saving: ${error.message}`, 'error');
                console.error('Error:', error);
            }
        }

        // Warn before leaving if there are unsaved changes
        window.addEventListener('beforeunload', (e) => {
            if (hasChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Load CSV on page load
        document.addEventListener('DOMContentLoaded', loadCSV);
    </script>
</body>
</html>
